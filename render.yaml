services:
  - type: web
    name: primeloot-opportunity-engine
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app/server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATA_DIR
        value: /opt/render/project/src/data
      - key: APP_NAME
        value: PrimeLoot
      - key: STORE_BRAND
        value: PrimeLoot Store
      - key: MELI_CLIENT_ID
        sync: false
      - key: MELI_CLIENT_SECRET
        sync: false
      - key: MELI_REDIRECT_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_WEB_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_REQUEST_TIMEOUT_SECONDS
        value: 240
      - key: OPENAI_MAX_OUTPUT_TOKENS
        value: 2600
      - key: AI_DAILY_SEARCH_LIMIT
        value: 3
      - key: AI_MIN_SECONDS_BETWEEN_SEARCHES
        value: 300
      - key: AI_MAX_CANDIDATES
        value: 4
      - key: AI_REQUIRED_CANDIDATES
        value: 4
      - key: AI_RESEARCH_MAX_ATTEMPTS
        value: 5
      - key: AI_CANDIDATE_POOL_SIZE
        value: 24
      - key: DEEP_SEARCH_MAX_MINUTES
        value: 20
      - key: LOCAL_SEARCH_ENABLED
        value: true
      - key: LOCAL_SEARCH_PROFILE
        value: balanced
      - key: LOCAL_SEARCH_MAX_HOURS
        value: 6
      - key: LOCAL_SEARCH_POOL_SIZE
        value: 300
      - key: OPENAI_FINAL_JUDGE_ONLY
        value: true
      - key: OPENAI_FINALISTS_LIMIT
        value: 10
