services:
  - type: web
    name: neobot-dropshipping-tech-mx
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app/server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATA_DIR
        value: /opt/render/project/src/data
      - key: MELI_CLIENT_ID
        sync: false
      - key: MELI_CLIENT_SECRET
        sync: false
      - key: MELI_REDIRECT_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_WEB_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_REQUEST_TIMEOUT_SECONDS
        value: 60
      - key: OPENAI_MAX_OUTPUT_TOKENS
        value: 1600
      - key: AI_DAILY_SEARCH_LIMIT
        value: 3
      - key: AI_MIN_SECONDS_BETWEEN_SEARCHES
        value: 300
      - key: AI_MAX_CANDIDATES
        value: 4
